<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evril Store - Detail Produk</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #0f2b48;
            /* Biru tua gelap */
            color: #f0f8ff;
            /* Putih kebiruan */
        }

        /* Header */
        header {
            background-color: #1e3799;
            /* Biru tua */
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid #38ada9;
            /* Biru muda */
        }

        .store-brand a {
            color: white;
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: bold;
        }

        .header-nav a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            padding: 8px 10px;
            border-radius: 4px;
            transition: background-color 0.3s;
        }

        .header-nav a.active {
            background-color: #38ada9;
            color: white;
        }

        .header-nav a:hover {
            background-color: #3c6382;
            /* Biru tua lebih muda */
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-actions input[type="text"] {
            padding: 7px;
            border: none;
            border-radius: 4px;
            width: 200px;
            outline: none;
        }

        .action-icons a {
            color: white;
            text-decoration: none;
            margin-left: 8px;
            font-size: 1.1rem;
        }

        .login-btn a {
            background-color: #38ada9;
            color: white;
            padding: 7px 14px;
            border-radius: 4px;
            text-decoration: none;
            transition: background-color 0.3s;
        }

        .login-btn a:hover {
            background-color: #22a6b3;
            /* Biru muda lebih tua */
        }

        /* Detail Produk Section */
        .product-detail {
            padding: 25px 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Gambar Produk */
        .product-image img {
            width: 100%;
            height: auto;
            border: 2px solid #38ada9;
            border-radius: 8px;
            background-color: white;
        }

        /* Informasi Produk */
        .product-info {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #38ada9;
            color: #0a3d62;
        }

        .game-tag a {
            display: inline-block;
            background-color: #38ada9;
            color: white;
            padding: 5px 12px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .product-type {
            font-size: 0.95rem;
            color: #3c6382;
            margin-bottom: 5px;
        }

        .product-title {
            font-size: 1.4rem;
            color: #1e3799;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .product-sold {
            font-size: 0.9rem;
            color: #3c6382;
            margin-bottom: 20px;
        }

        .product-price {
            font-size: 1.8rem;
            font-weight: bold;
            color: #1e3799;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #d1e8f7;
        }

        /* Tombol Aksi Produk */
        .action-buttons a {
            display: block;
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 6px;
            text-decoration: none;
            text-align: center;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        .btn-buy {
            background-color: #38ada9;
            color: white;
        }

        .btn-chat {
            background-color: #1e3799;
            color: white;
        }

        .action-buttons a:hover {
            opacity: 0.9;
        }

        /* Jaminan */
        .product-guarantee {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #d1e8f7;
            font-size: 0.9rem;
            color: #3c6382;
            text-align: center;
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header>
        <div class="store-brand">
            <a href="index.html">evril store </a>
        </div>
        <div class="header-nav">
            <a href="beranda.html">Beranda</a>
            <a href="produk.html" class="active">Produk</a>
            <a href="flash-sale.html">Flash Sale</a>
            <a href="kontak.html">Bantuan</a>
        </div>
        <div class="header-actions">
            <input type="text" placeholder="Cari akun, game, produk...">
            <div class="action-icons">
                <a href="wishlist.html">❤️</a>
                <a href="keranjang.html">🛒</a>
            </div>
            <div class="login-btn">
                <a href="masuk.html">Masuk</a>
            </div>
        </div>
    </header>

    <!-- Halaman Detail Produk -->
    <section class="product-detail">
        <div class="product-image">
            <img src="stok-1.jpeg" alt="Detail Akun Free Fire">
        </div>
        <div class="product-info">
            <div class="game-tag">
                <a href="free-fire.html">MOBALE LEGENS</a>
            </div>
            <div class="product-type">Regular Tier</div>
            <h1 class="product-title">AKUN MOBALE LEGENS SPEK SULTAN , AKUN IDAMAN</h1>
            <div class="product-sold">5 orang mempelajari produk ini</div>
            <div class="product-price">Rp 2.800.000</div>

            <div class="action-buttons">
                <a href="beli-sekarang.html" class="btn-buy">✅ Beli Sekarang (Instant)</a>
                <a href="chat-admin.html" class="btn-chat">💬 Tanya Admin (COD/EMO)</a>
            </div>

            <div class="product-guarantee">
                JAMINAN KEAMANAN & LAYANAN <br> Terpercaya 100%
            </div>
        </div>
    </section>
</body>

</html>
