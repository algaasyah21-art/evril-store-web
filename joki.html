<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>evril store Joki</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f0f8ff;
            color: #003366;
            line-height: 1.6;
        }

        /* Header & Navigasi */
        header {
            background-color: #003366;
            padding: 1rem 2rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .logo h1 {
            color: white;
            font-size: 1.4rem;
        }

        .search-bar input {
            padding: 0.5rem;
            border: none;
            border-radius: 4px;
            width: 280px;
            max-width: 100%;
        }

        .nav-menu {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .nav-links a,
        .auth-buttons a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            transition: background-color 0.3s ease;
        }

        .nav-links a:hover,
        .auth-buttons a:hover {
            background-color: #66b3ff;
        }

        .auth-buttons {
            display: flex;
            gap: 1rem;
        }

        /* Konten Utama */
        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .service-section {
            background-color: white;
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        /* Header Layanan */
        .service-header {
            display: flex;
            align-items: center;
            margin-bottom: 2rem;
            gap: 1rem;
        }

        .service-header img {
            width: 90px;
            height: 90px;
            border-radius: 6px;
            object-fit: cover;
        }

        .service-info h2 {
            color: #003366;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .service-tags {
            font-size: 0.9rem;
            color: #555;
        }

        .service-tags span {
            margin-right: 1rem;
        }

        /* Form Input Data Akun */
        .form-section {
            margin-bottom: 2rem;
        }

        .form-step h3 {
            color: #003366;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
            color: #003366;
        }

        .form-group input {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid #66b3ff;
            border-radius: 4px;
            background-color: #f8fcff;
            color: #003366;
        }

        /* Bagian Rating */
        .rating-section {
            text-align: right;
            margin-bottom: 1rem;
        }

        .rating-score {
            font-size: 1.8rem;
            color: #003366;
            margin-bottom: 0.3rem;
        }

        .stars {
            color: #ffd700;
            font-size: 1.2rem;
        }

        .rating-note {
            font-size: 0.9rem;
            color: #555;
            margin: 0.5rem 0;
        }

        .action-btn a {
            display: inline-block;
            background-color: #003366;
            color: white;
            text-decoration: none;
            padding: 0.7rem 1.5rem;
            border-radius: 4px;
            transition: background-color 0.3s ease;
        }

        .action-btn a:hover {
            background-color: #66b3ff;
            color: #003366;
        }

        /* Responsif untuk HP */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                text-align: center;
            }

            .nav-menu {
                flex-direction: column;
                width: 100%;
            }

            .nav-links,
            .auth-buttons {
                width: 100%;
                justify-content: center;
            }

            .service-header {
                flex-direction: column;
                text-align: center;
            }

            .rating-section {
                text-align: center;
            }
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header>
        <div class="logo">
            <h1>evril store joki</h1>
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Cari Layanan Joki...">
        </div>
        <div class="nav-menu">
            <div class="nav-links">
                <a href="topup.html">Top Up</a>
                <a href="trx.html">Cek Transaksi</a>
                <a href="beranda.html">beranda</a>
            </div>
            <div class="auth-buttons">
                <a href="masuk.html">Masuk</a>
                <a href="daftar.html">Daftar</a>
            </div>
        </div>
    </header>

    <!-- Konten Utama -->
    <main>
        <section class="service-section">
            <!-- Header Layanan Joki -->
            <div class="service-header">
                <img src="loga-ff.jpeg" alt="Joki Rank Free Fire">
                <div class="service-info">
                    <h2>JOKI RANK FREE FIRE</h2>
                    <div class="service-tags">
                        <span>Proses Cepat</span>
                        <span>Layanan Chat 24/7</span>
                        <span>Pembayaran Aman</span>
                    </div>
                </div>
            </div>

            <!-- Form Input Data Akun -->
            <div class="form-section">
                <div class="form-step">
                    <h3>1. Masukkan Data Akun</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Nama / Username (Jika Membutuhkan Login Sementara)</label>
                            <input type="text" placeholder="Masukkan nama/username...">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" placeholder="Masukkan email aktif...">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" placeholder="Masukkan password...">
                        </div>
                        <div class="form-group">
                            <label>Kode Pembelian (Jika Ada / Jika Tidak Ada Kosongkan)</label>
                            <input type="text" placeholder="Masukkan kode pembelian...">
                        </div>
                        <div class="form-group">
                            <label>ID Akun</label>
                            <input type="text" placeholder="Masukkan ID akun game...">
                        </div>
                        <div class="form-group">
                            <label>Nama Akun/Username Yang Akan Di Joki (Jangan Samakan Dengan Yang Lain)</label>
                            <input type="text" placeholder="Masukkan nama akun joki...">
                        </div>
                    </div>
                </div>

                <div class="form-step">
                    <h3>2. Pilih Nominal/Jenis Joki</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Pilih Paket Joki</label>
                            <input type="text" placeholder="Pilih paket yang diinginkan...">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bagian Rating & Tombol Aksi -->
            <div class="rating-section">
                <div class="rating-score">5.00 <span class="stars">★★★★★</span></div>
                <p class="rating-note">Berdasarkan total 240 rating</p>
                <p class="rating-note">Butuh Bantuan? Kunjungi Hubungi admin kami</p>
                <div class="action-btn">
                    <a href="#pesansekarang">Pesan Sekarang!</a>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
