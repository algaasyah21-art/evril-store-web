<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>evril store - Masuk ke Akun</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #003366;
            /* Biru tua utama */
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header Navigasi */
        header {
            background-color: #004499;
            /* Biru tua sedikit lebih muda */
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo h2 {
            color: #66b3ff;
            /* Biru muda */
            font-size: 1.4rem;
        }

        .nav-menu a {
            color: white;
            text-decoration: none;
            margin-right: 1.5rem;
            padding: 0.5rem 0.8rem;
            border-radius: 4px;
            transition: background-color 0.3s ease;
        }

        .nav-menu a:hover {
            background-color: #66b3ff;
            color: #003366;
        }

        .search-bar input {
            padding: 0.5rem;
            border: none;
            border-radius: 4px;
            width: 250px;
            max-width: 100%;
        }

        .auth-btn a {
            background-color: #66b3ff;
            color: #003366;
            padding: 0.5rem 1.2rem;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        .auth-btn a:hover {
            background-color: white;
        }

        /* Konten Utama - Form Login */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
        }

        .login-container {
            background-color: #004499;
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h3 {
            font-size: 1.8rem;
            color: #66b3ff;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* Tombol Google */
        .google-btn {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1.5rem;
            background-color: white;
            color: #003366;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .google-btn a {
            color: inherit;
            text-decoration: none;
            display: block;
            width: 100%;
            height: 100%;
        }

        .google-btn:hover {
            background-color: #f0f8ff;
        }

        /* Pembatas */
        .divider {
            text-align: center;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background-color: rgba(255, 255, 255, 0.3);
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .divider span {
            background-color: #004499;
            padding: 0 0.5rem;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* Form Input */
        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            color: #66b3ff;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #66b3ff;
            border-radius: 6px;
            background-color: #f0f8ff;
            color: #003366;
            font-size: 1rem;
        }

        .form-group input::placeholder {
            color: rgba(0, 51, 102, 0.6);
        }

        /* Tombol Login Email */
        .email-login-btn {
            width: 100%;
            padding: 0.9rem;
            background-color: #66b3ff;
            color: #003366;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .email-login-btn a {
            color: inherit;
            text-decoration: none;
            display: block;
            width: 100%;
            height: 100%;
        }

        .email-login-btn:hover {
            background-color: white;
        }

        /* Footer Cookie */
        footer {
            background-color: #004499;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .cookie-text {
            max-width: 600px;
        }

        .cookie-buttons a {
            padding: 0.5rem 1.2rem;
            text-decoration: none;
            border-radius: 4px;
            margin-left: 1rem;
            font-weight: bold;
        }

        .btn-essential {
            background-color: #003366;
            color: white;
        }

        .btn-optional {
            background-color: #66b3ff;
            color: #003366;
        }

        /* Responsif */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                text-align: center;
            }

            .nav-menu {
                margin: 1rem 0;
            }

            footer {
                flex-direction: column;
                text-align: center;
            }

            .cookie-buttons a {
                margin: 0.5rem;
                display: inline-block;
            }
        }
    </style>
</head>

<body>
    <!-- Header Navigasi -->
    <header>
        <div class="logo">
            <h2>evril store</h2>
        </div>
        <div class="nav-menu">
            <a href="beranda.html">Beranda</a>
            <a href="produk.html">Produk</a>
            <a href="topup.html">top up </a>
            <a href="kontak.html">Bantuan</a>
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Cari akun, game, produk...">
        </div>
        <div class="auth-btn">
            <a href="#masuk">Masuk</a>
        </div>
    </header>

    <!-- Konten Utama - Form Login -->
    <main>
        <div class="login-container">
            <div class="login-header">
                <h3>Masuk ke Akun</h3>
                <p>Login dengan Google atau email</p>
            </div>

            <button class="google-btn">
                <a href="#logingoogle">Lanjutkan dengan Google</a>
            </button>

            <div class="divider">
                <span>atau login dengan email</span>
            </div>

            <form>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="email@example.com">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Masukkan password">
                </div>

                <button class="email-login-btn">
                    <a href="#loginemail">Masuk dengan Email</a>
                </button>
            </form>
        </div>
    </main>

    <!-- Footer Cookie -->
    <footer>
        <div class="cookie-text">
            Dengan menggunakan situs ini, Anda menyetujui penggunaan cookies untuk analitik dan pemasaran. Pelajari
            lebih lanjut di kebijakan kami.
        </div>
        <div class="cookie-buttons">
            <a href="#hanyaessential" class="btn-essential">Hanya Essensial</a>
            <a href="#terimasemua" class="btn-optional">Terima Semua</a>
        </div>
    </footer>
</body>

</html>
